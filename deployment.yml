apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java-container
          image: 224075521027.dkr.ecr.us-east-1.amazonaws.com/myapp:latest
          ports:
            - containerPort: 80
